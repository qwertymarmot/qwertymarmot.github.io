---
layout: Post
---

<h1>Latest Posts</h1>

  {% for post in site.posts %}
    <div class="notelist-feed">
        <a href="{{ site.url }}{{ post.url }}">
          <h6>{{ post.title }}</h6>
            <p class="excerpt">
              {{ post.excerpt }}
            </p>
        </a>
    </div>
  {% endfor %}

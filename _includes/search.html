<form action="/search.html" method="get">
  <label for="search-box">Search</label>
  <input type="text" id="search-box" name="query">
  <input type="submit" value="search">
</form>

<ul id="search-results"></ul>

<script>
  window.store = {
    {% assign note_items = site.notes | sort: "date" | reverse %}
    {% for note_items in note_items %}
      "{{ note_items.url | slugify }}": {
        "title": "{{ note_items.title | xml_escape }}",
        "content": {{ note_items.content | strip_html | strip_newlines | jsonify }},
        "url": "{{ note_items.url | xml_escape }}"
      }
      {% unless forloop.last %},{% endunless %}
    {% endfor %}
  };
</script>
<script src="/js/lunr.min.js"></script>
<script src="/js/search.js"></script>
